# Fly.io 배포 설정 — `fly launch --no-deploy` 후 앱 이름만 맞추면 됨
app = "jvision-portfolio-hub"
primary_region = "nrt" # 도쿄 (한국에서 가장 가까움)

[build]

[env]
  # 커스텀 도메인을 붙이면 그 주소로 바꾼다 (예: https://jvision.example.com)
  NEXTAUTH_URL = "https://jvision-portfolio-hub.fly.dev"
  VISION_AUTH_URL = "https://portal.jvision.ac.kr/user/loginAuth.face"
  DATABASE_URL = "file:/data/prod.db"
  UPLOAD_DIR = "/data/uploads"

# 영구 볼륨 — SQLite DB와 업로드 파일 보관 (휘발 방지)
[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1 # SQLite 단일 인스턴스 + 콜드스타트 방지

# LibreOffice 변환에 메모리가 필요해 1GB 권장
[[vm]]
  memory = "1gb"
  cpus = 1
